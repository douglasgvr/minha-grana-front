<div class="cards-container">
  <div class="card card-receita">
    <div class="card-header">
      <h3>Receitas</h3>
      <i class="ph ph-trend-up icon-receita"></i>
    </div>
    <h2>{{ resumo.totalReceitas | currency: 'BRL' }}</h2>
  </div>

  <div class="card card-despesa">
    <div class="card-header">
      <h3>Despesas</h3>
      <i class="ph ph-trend-down icon-despesa"></i>
    </div>
    <h2>{{ resumo.totalDespesas | currency: 'BRL' }}</h2>
  </div>

  <div class="card card-saldo">
    <div class="card-header">
      <h3>Saldo Atual</h3>
      <i class="ph ph-wallet icon-saldo"></i>
    </div>
    <h2>{{ resumo.saldoAtual | currency: 'BRL' }}</h2>
  </div>
</div>

<div class="actions-container">
  <button class="btn btn-primary" (click)="abrirModal()">+ Nova Transação</button>
</div>

<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal-box">
    <h2>Nova Transação 💸</h2>

    <div class="form-group">
      <label>Descrição</label>
      <input
        type="text"
        placeholder="Ex: Mercado da semana"
        [(ngModel)]="novaTransacao.descricao"
      />
    </div>

    <div class="form-group">
      <label>Valor (R$)</label>
      <input type="number" placeholder="0.00" [(ngModel)]="novaTransacao.valor" />
    </div>

    <div class="form-group">
      <label>Tipo</label>
      <select [(ngModel)]="novaTransacao.tipo">
        <option value="RECEITA">Receita (Entrada)</option>
        <option value="DESPESA">Despesa (Saída)</option>
      </select>
    </div>

    <div class="modal-buttons">
      <button class="btn-cancel" (click)="fecharModal()">Cancelar</button>
      <button class="btn-success" (click)="salvarTransacao()">Salvar</button>
    </div>
  </div>
</div>
