<div class="login-container">
  <h1>Minha Grana</h1>
  <p>Bem-vindo ao controle financeiro do casal!</p>
  <p>Crie sua Conta para Começar!</p>

  <div>
    <label for="">Nome</label>
    <input [(ngModel)]="nomeDigitado" type="text" placeholder="Digite seu nome" />
  </div>

  <div>
    <label for="">Email</label>
    <input [(ngModel)]="emailDigitado" type="email" placeholder="Digite seu email" />
  </div>

  <div>
    <label for="">Senha</label>
    <input [(ngModel)]="senhaDigitada" type="password" placeholder="Digite sua senha" />
  </div>

  <button (click)="criarConta()">Criar Conta</button>
</div>
