<div class="setup-container">
  <h1>Bem-vindo ao Minha Grana! 🎉</h1>
  <p>Para começar a controlar suas finanças, precisamos configurar o seu cofre.</p>

  <div class="options-container">
    <div class="option-card">
      <h3>🏦 Novo Cofre Familiar</h3>
      <p class="description">Serei o administrador e convidarei meu parceiro(a).</p>
      <button class="btn-create" (click)="criarCofre()">Criar Meu Cofre</button>
    </div>

    <div class="option-card">
      <h3>🤝 Já tenho um Convite</h3>
      <p class="description">Meu parceiro(a) já criou o cofre e me passou o código.</p>
      <input type="text" placeholder="Digite o código aqui" class="input-code" />
      <button class="btn-join">Entrar no Cofre</button>
    </div>
  </div>
</div>
